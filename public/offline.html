<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ออฟไลน์ — ระบบบริหารจัดการโรงเรียน</title>
  <style>
    body { font-family: 'Sarabun', system-ui, sans-serif; display: flex; min-height: 100vh; margin: 0; align-items: center; justify-content: center; background: #fafafa; color: #171717; }
    .box { text-align: center; padding: 2rem; }
    .icon { font-size: 3rem; }
    h1 { font-size: 1.25rem; margin: .75rem 0 .25rem; }
    p { color: #737373; margin: 0 0 1.25rem; }
    button { font: inherit; padding: .5rem 1.5rem; border-radius: .5rem; border: none; background: #171717; color: #fff; cursor: pointer; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>ไม่มีการเชื่อมต่ออินเทอร์เน็ต</h1>
    <p>กรุณาตรวจสอบการเชื่อมต่อ แล้วลองอีกครั้ง</p>
    <button onclick="location.reload()">ลองใหม่</button>
  </div>
</body>
</html>
